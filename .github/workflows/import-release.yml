name: Import Product Release

on:
  repository_dispatch:
    types:
      - new_release

permissions:
  contents: write

jobs:
  import:
    name: 'Import & Index Release'
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Checkout packages repository
        uses: actions/checkout@v7

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Install indexing and signing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils createrepo-c rpm gpg

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download all .deb assets from the release to apt/pool/main/
          gh release download "${{ github.event.client_payload.tag }}" \
            --repo "${{ github.event.client_payload.repo }}" \
            --pattern "*.deb" \
            --dir apt/pool/main/ --clobber || true

          # Download all .rpm assets from the release to rpm/pool/
          gh release download "${{ github.event.client_payload.tag }}" \
            --repo "${{ github.event.client_payload.repo }}" \
            --pattern "*.rpm" \
            --dir rpm/pool/ --clobber || true

      - name: Prune old versions from pool
        run: |
          # Keep the latest 3 versions of each package to prevent bloat
          cargo run --release --bin prune || true

      - name: Import GPG private key
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          # Set up GPG agent to allow loopback pinentry
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          chmod 700 ~/.gnupg
          gpgconf --kill gpg-agent

          # Create passphrase file and wrapper script if passphrase is set
          if [ -n "$GPG_PASSPHRASE" ]; then
            echo "$GPG_PASSPHRASE" > /tmp/gpg-passphrase.txt
            chmod 600 /tmp/gpg-passphrase.txt
            echo '#!/bin/bash' > /tmp/gpg-wrapper
            echo 'exec gpg --pinentry-mode loopback --passphrase-file /tmp/gpg-passphrase.txt "$@"' >> /tmp/gpg-wrapper
            chmod +x /tmp/gpg-wrapper
            echo "$GPG_PRIVATE_KEY" | /tmp/gpg-wrapper --batch --yes --import
          else
            echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          fi

      - name: Sign packages and rebuild metadata indexes
        env:
          CRATERIA_GPG_NAME: ${{ secrets.CRATERIA_GPG_NAME }}
          CRATERIA_SKIP_RPM_SIGN_INSTALL: "true"
        run: |
          # Re-sign the RPM package files and rebuild all repository metadata indices
          export CRATERIA_GPG_NAME="${CRATERIA_GPG_NAME:-jerydleuck@gmail.com}"
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            if [ -n "$GPG_PASSPHRASE" ]; then
              export CRATERIA_GPG_BIN="/tmp/gpg-wrapper"
            fi
            # Run GPG signing and metadata rebuilding tool
            cargo run --release --bin sign
            # Clean up passphrase file
            rm -f /tmp/gpg-passphrase.txt /tmp/gpg-wrapper
          else
            # Rebuild metadata without GPG signing if key is not configured
            cargo run --release --bin update
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # Commit only if files have changed (e.g. packages added or indices updated)
          git diff-index --quiet HEAD || git commit -m "Import ${{ github.event.client_payload.repo }} ${{ github.event.client_payload.tag }}"
          git pull --rebase
          git push
