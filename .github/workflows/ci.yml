name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Rust components
        run: rustup component add clippy rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all

      - name: Run cargo clippy --fix
        run: cargo clippy --workspace --all-targets --all-features --fix --allow-dirty --allow-staged

      - name: Auto-commit fmt and clippy fixes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: auto-format and fix clippy lints"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Run cargo clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run cargo test
        run: cargo test --all-targets --all-features

      - name: Install cargo-deny
        run: |
          curl -sSL https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.9/cargo-deny-0.19.9-x86_64-unknown-linux-musl.tar.gz | tar -xz
          echo "$PWD/cargo-deny-0.19.9-x86_64-unknown-linux-musl" >> $GITHUB_PATH

      - name: Run cargo deny check
        run: cargo deny check advisories
