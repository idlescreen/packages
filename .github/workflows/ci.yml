name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Rust components
        run: rustup component add clippy rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all

      - name: Run cargo clippy --fix
        run: cargo clippy --workspace --all-targets --all-features --fix --allow-dirty --allow-staged

      - name: Auto-commit fmt and clippy fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format and fix clippy lints"

      - name: Run cargo clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run cargo test
        run: cargo test --all-targets --all-features

      - name: Install cargo-deny
        run: |
          curl -sSL https://github.com/EmbarkStudios/cargo-deny/releases/download/0.19.9/cargo-deny-0.19.9-x86_64-unknown-linux-musl.tar.gz | tar -xz
          echo "$PWD/cargo-deny-0.19.9-x86_64-unknown-linux-musl" >> $GITHUB_PATH

      - name: Run cargo deny check
        run: cargo deny check advisories
